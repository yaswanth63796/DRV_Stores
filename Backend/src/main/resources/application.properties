# PostgreSQL Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/drvstores}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=${PORT:8081}

# JWT Configuration
jwt.secret=${JWT_SECRET:drvstoresSecretKey12345678901234567890}
jwt.expiration=86400000

# Allow circular references temporarily
spring.main.allow-circular-references=true

razorpay.key.id=${RAZORPAY_KEY_ID:dummy_id}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:dummy_secret}
